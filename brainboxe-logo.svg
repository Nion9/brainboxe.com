<svg width="248" height="64" viewBox="0 0 248 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BrainBoxe">
  <defs>
    <linearGradient id="bb-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC15E"/>
      <stop offset="1" stop-color="#D17C28"/>
    </linearGradient>
  </defs>
  <!-- mark: a neural core enclosed in a box -->
  <g transform="translate(10,12)">
    <rect x="2" y="2" width="36" height="36" rx="10" fill="none" stroke="url(#bb-amber)" stroke-width="2.5"/>
    <g stroke="url(#bb-amber)" stroke-width="1.6" opacity="0.85">
      <line x1="20" y1="20" x2="11" y2="11"/>
      <line x1="20" y1="20" x2="29" y2="11"/>
      <line x1="20" y1="20" x2="11" y2="29"/>
      <line x1="20" y1="20" x2="29" y2="29"/>
    </g>
    <g fill="url(#bb-amber)">
      <circle cx="11" cy="11" r="2.4"/>
      <circle cx="29" cy="11" r="2.4"/>
      <circle cx="11" cy="29" r="2.4"/>
      <circle cx="29" cy="29" r="2.4"/>
      <circle cx="20" cy="20" r="4.6"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="62" y="40" font-family="'Space Grotesk', system-ui, sans-serif" font-size="27" font-weight="600" fill="#FBF6F0" letter-spacing="-0.6">BrainBoxe</text>
</svg>
